name: Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build ARM64 (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build
        run: make build-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtool-darwin-arm64
          path: dist/darwin-arm64/mtool
          retention-days: 7

  package:
    name: Package
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dist directories
        run: |
          mkdir -p dist/darwin-arm64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mtool-darwin-arm64
          path: dist/darwin-arm64/

      - name: Make binary executable
        run: |
          chmod +x dist/darwin-arm64/mtool

      - name: Package
        run: make package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mtool-packages
          path: dist/*.tar.gz
          retention-days: 7

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dist directories
        run: |
          mkdir -p dist/darwin-arm64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mtool-darwin-arm64
          path: dist/darwin-arm64/

      - name: Make binary executable
        run: |
          chmod +x dist/darwin-arm64/mtool

      - name: Package
        run: make package

      - name: Get changelog
        id: changelog
        run: |
          TAG=$(echo ${GITHUB_REF#refs/tags/})
          PREV_TAG=$(git describe --tags --abbrev=0 ${TAG}^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # No previous tag, show last 20 commits
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            git log --oneline -20
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # Show commits between tags
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            git log --oneline ${PREV_TAG}..${TAG}
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.tar.gz
          draft: false
          prerelease: false
          body: |
            **Changes:**
            ```
            ${{ steps.changelog.outputs.changelog }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mtool-release
          path: dist/*.tar.gz
