name: Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Darwin binaries
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build arm64
        run: make build-arm64

      - name: Build amd64
        run: make build-amd64

      # ────────────────────────────────────────
      # 关键调试步骤：强制看文件到底生成了没有
      # ────────────────────────────────────────
      - name: Debug - List dist/ contents (must see files here!)
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents of dist/:"
          ls -la dist/ 2>&1 || echo "dist/ does NOT exist!"
          echo ""
          echo "All .tar.gz files anywhere:"
          find . -type f -name "*.tar.gz" 2>/dev/null || echo "No .tar.gz files found anywhere"
          echo ""
          echo "Full tree of dist/ if exists:"
          tree dist/ 2>/dev/null || echo "tree command failed or dist/ missing"

      - name: Upload Darwin artifacts
        uses: actions/upload-artifact@v4
        # 即使前面失败也尝试上传（方便 debug）
        if: always()                                
        with:
          name: darwin-binaries
          path: dist/*.tar.gz
          if-no-files-found: error                    # 改成 error → 如果没文件，build job 会失败（容易发现）
          compression-level: 6
          retention-days: 7

  package:
    name: Package
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ALL artifacts (debug mode)
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts/

      - name: Show what was actually downloaded
        run: |
          tree downloaded-artifacts/ || ls -R downloaded-artifacts/
          find downloaded-artifacts/ -type f || true

      - name: Move files to expected dist/ location
        run: |
          mkdir -p dist/
          mv downloaded-artifacts/**/dist/*.tar.gz dist/ 2>/dev/null || true
          ls -la dist/

      - name: Run package
        run: make package

      - name: Show packaged files (debug)
        run: ls -lh dist/ || true

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-files
          path: dist/*.tar.gz
          retention-days: 7

  release:
    name: Create GitHub Release
    # 只在 push tag 时运行 release 步骤
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 为了 git describe / git log 能拿到历史 tag

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: packaged-files
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$PREV_TAG" ]; then
            echo "Initial release - no previous tag found"
            git log --oneline -n 20
          else
            echo "Changes since ${PREV_TAG}:"
            git log --oneline "${PREV_TAG}..${TAG}"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            **Changes:**
