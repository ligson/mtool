name: Build and Release

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Darwin binaries
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build arm64
        run: make build-arm64

      - name: Build amd64
        run: make build-amd64

      - name: Run package
        run: make package

      - name: Upload Darwin artifacts
        uses: actions/upload-artifact@v4
        # 即使前面失败也尝试上传（方便 debug）
        if: always()                                
        with:
          name: darwin-binaries
          path: dist/*.tar.gz
          if-no-files-found: error                    # 改成 error → 如果没文件，build job 会失败（容易发现）
          compression-level: 6
          retention-days: 7
         


  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 为了 git describe / git log 能拿到历史 tag

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: packaged-files
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          git log -1 --oneline
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            **Changes:**
