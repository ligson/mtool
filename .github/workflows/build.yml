name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build-arm64:
    name: Build ARM64 (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build ARM64
        run: make build-arm64

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v3
        with:
          name: mtool-darwin-arm64
          path: dist/darwin-arm64/mtool
          retention-days: 7

  build-amd64:
    name: Build x86_64 (Intel)
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build x86_64
        run: make build-amd64

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v3
        with:
          name: mtool-darwin-amd64
          path: dist/darwin-amd64/mtool
          retention-days: 7

  package:
    name: Package
    needs: [build-arm64, build-amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dist directories
        run: |
          mkdir -p dist/darwin-arm64
          mkdir -p dist/darwin-amd64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v3
        with:
          name: mtool-darwin-arm64
          path: dist/darwin-arm64/

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v3
        with:
          name: mtool-darwin-amd64
          path: dist/darwin-amd64/

      - name: Make binaries executable
        run: |
          chmod +x dist/darwin-arm64/mtool
          chmod +x dist/darwin-amd64/mtool

      - name: Package
        run: make package

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mtool-packages
          path: dist/*.tar.gz
          retention-days: 7

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dist directories
        run: |
          mkdir -p dist/darwin-arm64
          mkdir -p dist/darwin-amd64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v3
        with:
          name: mtool-darwin-arm64
          path: dist/darwin-arm64/

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v3
        with:
          name: mtool-darwin-amd64
          path: dist/darwin-amd64/

      - name: Make binaries executable
        run: |
          chmod +x dist/darwin-arm64/mtool
          chmod +x dist/darwin-amd64/mtool

      - name: Package
        run: make package

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mtool-release
          path: dist/*.tar.gz
