name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main, master]
    tags: [v*]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - run: make build-arm64
      - run: make build-amd64
      - run: make package

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-files
          path: dist/*.tar.gz
          retention-days: 7

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: packaged-files
          path: dist/

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=$(grep "VERSION := " Makefile | awk '{print $3}')
          echo "Version: $VERSION"

          # 尝试从 CHANGELOG.md 提取内容
          if bash scripts/extract-changelog.sh "$VERSION" > changelog_content.txt 2>&1; then
            echo "✓ Successfully extracted changelog"
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            cat changelog_content.txt
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "⚠ Failed to extract changelog, using git log"
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            git log -1 --format="**Latest commit:** %s%n%n%B"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "VERSION := " Makefile | awk '{print $3}')
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}